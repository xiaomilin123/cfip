name: Sync IPs from cf-speed-dns

on:
  schedule:
    # 每30分钟执行一次
    - cron: '*/30 * * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  sync-ips:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Fetch and parse IP data
      run: |
        # 获取HTML内容
        echo "Fetching IP data from cf-speed-dns..."
        html_content=$(curl -s "https://raw.githubusercontent.com/ZhiXuanWang/cf-speed-dns/refs/heads/main/ipTop10.html")
        
        # 提取所有IP地址并去重
        echo "Extracting IP addresses..."
        extracted_ips=$(echo "$html_content" | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' | sort -u)
        
        # 验证IP格式并过滤
        valid_ips=()
        for ip in $extracted_ips; do
          if [[ $ip =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
            # 验证每个数字是否在0-255范围内
            valid_ip=true
            for octet in $(echo $ip | sed 's/\./ /g'); do
              if [[ $octet -lt 0 ]] || [[ $octet -gt 255 ]]; then
                valid_ip=false
                break
              fi
            done
            
            if [[ $valid_ip == true ]]; then
              valid_ips+=("$ip")
            fi
          fi
        done
        
        # 创建输出文件
        output_file="ips.txt"
        > $output_file
        
        count=0
        for ip in "${valid_ips[@]}"; do
          # 直接使用CF-github标注
          formatted_line="$ip:443#CF-github"
          echo "$formatted_line" >> $output_file
          echo "Added: $formatted_line"
          ((count++))
        done
        
        echo "Processing complete. Generated ips.txt with $count entries."
        
    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # 检查是否有更改
        if [[ -n "$(git status --porcelain)" ]]; then
          git add ips.txt
          git commit -m "Update IPs from cf-speed-dns - $(date)"
          git push
        fi
