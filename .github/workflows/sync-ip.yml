name: Sync IPs from cf-speed-dns

on:
  schedule:
    # 每30分钟执行一次
    - cron: '*/30 * * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  sync-ips:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Fetch and parse IP data
      run: |
        # 获取HTML内容
        echo "Fetching IP data from cf-speed-dns..."
        html_content=$(curl -s "https://raw.githubusercontent.com/ZhiXuanWang/cf-speed-dns/refs/heads/main/ipTop10.html")
        
        # 创建临时文件存储解析结果
        temp_file="temp_ips.txt"
        echo "$html_content" > $temp_file
        
        # 提取所有IP地址（使用更全面的正则表达式）
        echo "Extracting IP addresses..."
        extracted_ips=$(grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' $temp_file | sort -u)
        
        # 验证IP格式并过滤
        valid_ips=()
        for ip in $extracted_ips; do
          if [[ $ip =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
            # 验证每个数字是否在0-255范围内
            valid_ip=true
            for octet in $(echo $ip | sed 's/\./ /g'); do
              if [[ $octet -lt 0 ]] || [[ $octet -gt 255 ]]; then
                valid_ip=false
                break
              fi
            done
            
            if [[ $valid_ip == true ]]; then
              valid_ips+=("$ip")
            fi
          fi
        done
        
        # 创建输出文件
        output_file="ips.txt"
        > $output_file
        
        count=0
        for ip in "${valid_ips[@]}"; do
          # 基于CF常用IP段进行分类
          first_octet=$(echo "$ip" | cut -d. -f1)
          second_octet=$(echo "$ip" | cut -d. -f2)
          
          case $first_octet in
            103)
              # 103.21.244.0/22, 103.22.200.0/22, 103.31.4.0/22
              country_code="SG"  # 新加坡
              ;;
            104)
              # 104.16.0.0/12 - 主要在美国
              country_code="US"
              ;;
            108)
              # 108.162.192.0/18 - 主要在美国
              country_code="US"
              ;;
            131)
              # 131.0.72.0/22 - 主要在美国
              country_code="US"
              ;;
            141)
              # 141.101.64.0/18 - 主要在美国
              country_code="US"
              ;;
            162)
              # 162.158.0.0/15, 162.159.0.0/16 - 主要在美国
              country_code="US"
              ;;
            172)
              # 172.64.0.0/13 - 主要在美国
              country_code="US"
              ;;
            173)
              # 173.245.48.0/20 - 主要在美国
              country_code="US"
              ;;
            188)
              # 188.114.96.0/20 - 主要在美国
              country_code="US"
              ;;
            190)
              # 190.93.240.0/20 - 巴拿马
              country_code="PA"
              ;;
            197)
              # 197.234.240.0/22 - 美国
              country_code="US"
              ;;
            198)
              # 198.41.128.0/17 - 美国
              country_code="US"
              ;;
            *)
              country_code="US"  # 默认美国
              ;;
          esac
          
          # 生成格式化的输出
          formatted_line="$ip:443#$country_code-github"
          echo "$formatted_line" >> $output_file
          echo "Added: $formatted_line"
          ((count++))
        done
        
        # 清理临时文件
        rm $temp_file
        
        echo "Processing complete. Generated ips.txt with $count entries."
        
    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # 检查是否有更改
        if [[ -n "$(git status --porcelain)" ]]; then
          git add ips.txt
          git commit -m "Update IPs from cf-speed-dns - $(date)"
          git push
          echo "Changes committed and pushed successfully"
        else
          echo "No changes to commit"
        fi
