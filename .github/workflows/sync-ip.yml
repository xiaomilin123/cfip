name: Sync IPs from cf-speed-dns

on:
  schedule:
    # 免费仓库最小间隔1小时，每小时执行一次
    - cron: '0 * * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  sync-ips:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Fetch and parse IP data
      run: |
        # 错误捕获
        trap 'echo -e "\nERROR: 脚本在第 $LINENO 行崩溃！执行的命令是: $BASH_COMMAND"' ERR
        
        # 开启调试
        set -x
        
        # 获取内容
        echo "Fetching IP data from cf-speed-dns..."
        html_content=$(curl -sL -f "https://raw.githubusercontent.com/ZhiXuanWang/cf-speed-dns/refs/heads/main/ipTop10.html")
        if [ -z "$html_content" ]; then
          echo "Error: 拉取页面内容为空！"
          exit 1
        fi
        
        # 提取所有IP地址并去重
        echo "Extracting IP addresses..."
        extracted_ips=$(echo "$html_content" | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' | sort -u)
        
        # 创建输出文件
        output_file="ips.txt"
        > $output_file
        
        count=0
        # 逐行处理IP
        echo "$extracted_ips" | while read ip; do
          [ -z "$ip" ] && continue
          
          if [[ $ip =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
            valid_ip=true
            IFS='.' read -ra octets <<< "$ip"
            
            for octet in "${octets[@]}"; do
              dec_octet=$((10#$octet))
              if [[ $dec_octet -lt 0 ]] || [[ $dec_octet -gt 255 ]]; then
                valid_ip=false
                break
              fi
            done
            
            if [[ $valid_ip == true ]]; then
              # 自动查询IP归属国
              country=$(curl -sL -f --connect-timeout 5 "https://ipinfo.io/$ip/country")
              
              # 所有国家都用对应的缩写，查询失败才用CF
              if [ -n "$country" ] && [ ${#country} -eq 2 ]; then
                flag="$country"
              else
                flag="CF"
              fi
              
              # 生成带国家标记的行
              formatted_line="$ip:443#$flag-github"
              echo "$formatted_line" >> $output_file
              echo "Added: $formatted_line"
              
              count=$((count + 1))
            fi
          fi
        done
        
        echo "Processing complete. Generated ips.txt with $count entries."
        
    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # 检查是否有更改
        if [[ -n "$(git status --porcelain)" ]]; then
          git add ips.txt
          git commit -m "Update IPs from cf-speed-dns - $(date)"
          git push
        else
          echo "No changes to commit, skip push."
        fi
