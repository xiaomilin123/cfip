name: Sync IPs from cf-speed-dns

on:
  schedule:
    # 每30分钟执行一次
    - cron: '*/30 * * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  sync-ips:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Fetch and parse IP data
      run: |
        # 获取HTML内容
        echo "Fetching IP data from cf-speed-dns..."
        html_content=$(curl -s "https://raw.githubusercontent.com/ZhiXuanWang/cf-speed-dns/main/ipTop10.html")
        
        # 创建临时文件存储解析结果
        temp_file="temp_ips.txt"
        echo "$html_content" > $temp_file
        
        # 提取IP地址的正则模式
        ips=()
        while IFS= read -r line; do
          # 查找包含IP的行
          if [[ $line =~ ([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}) ]]; then
            ip=$(echo "$line" | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' | head -1)
            if [[ -n "$ip" ]]; then
              ips+=("$ip")
            fi
          fi
        done < $temp_file
        
        # 去重
        unique_ips=($(printf '%s\n' "${ips[@]}" | sort -u))
        
        # 创建输出文件
        output_file="ips.txt"
        > $output_file
        
        # 解析IP地理位置并生成格式化的输出
        for ip in "${unique_ips[@]}"; do
          if [[ -n "$ip" ]]; then
            # 使用免费的IP地理位置API获取国家信息
            country_code=$(curl -s --connect-timeout 5 "http://ip-api.com/json/$ip?fields=countryCode" | jq -r '.countryCode' 2>/dev/null || echo "UNKNOWN")
            
            # 如果API调用失败，使用备用方法
            if [[ "$country_code" == "UNKNOWN" ]] || [[ -z "$country_code" ]] || [[ "$country_code" == "null" ]]; then
              # 使用另一个API作为备用
              country_code=$(curl -s --connect-timeout 5 "https://ipapi.co/$ip/country_code/" 2>/dev/null || echo "UNKNOWN")
            fi
            
            # 如果仍然失败，使用更简单的分类方法
            if [[ "$country_code" == "UNKNOWN" ]] || [[ -z "$country_code" ]]; then
              # 基于IP段进行粗略分类
              first_octet=$(echo "$ip" | cut -d. -f1)
              second_octet=$(echo "$ip" | cut -d. -f2)
              
              # 根据IP段范围进行大致分类（仅供参考）
              if [[ "$first_octet" -eq 108 ]] || [[ "$first_octet" -eq 162 ]] || [[ "$first_octet" -eq 172 ]] || [[ "$first_octet" -eq 198 ]]; then
                country_code="US"
              elif [[ "$first_octet" -eq 104 ]]; then
                country_code="US"
              elif [[ "$first_octet" -eq 173 ]]; then
                country_code="US"
              elif [[ "$first_octet" -eq 141 ]]; then
                country_code="US"
              elif [[ "$first_octet" -eq 103 ]]; then
                # 亚洲区域
                if [[ "$second_octet" -ge 21 ]] && [[ "$second_octet" -le 24 ]]; then
                  country_code="SG"
                else
                  country_code="AS"
                fi
              else
                country_code="UNKNOWN"
              fi
            fi
            
            # 生成格式化的输出
            formatted_line="$ip:443#$country_code-github"
            echo "$formatted_line" >> $output_file
            echo "Added: $formatted_line"
          fi
        done
        
        # 清理临时文件
        rm $temp_file
        
        echo "Processing complete. Generated ips.txt with $(wc -l < $output_file) entries."
        
    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # 检查是否有更改
        if [[ -n "$(git status --porcelain)" ]]; then
          git add ips.txt
          git commit -m "Update IPs from cf-speed-dns - $(date)"
          git push
          echo "Changes committed and pushed successfully"
        else
          echo "No changes to commit"
        fi
