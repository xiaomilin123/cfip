name: Sync IPs from cf-speed-dns

on:
  schedule:
    # 每30分钟执行一次
    - cron: '*/30 * * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  sync-ips:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq
        
    - name: Fetch and parse IP data
      run: |
        # 获取HTML内容
        echo "Fetching IP data from cf-speed-dns..."
        html_content=$(curl -s "https://raw.githubusercontent.com/ZhiXuanWang/cf-speed-dns/main/ipTop10.html")
        
        # 创建临时文件存储解析结果
        temp_file="temp_ips.txt"
        echo "$html_content" > $temp_file
        
        # 提取所有IP地址
        echo "Extracting IP addresses..."
        extracted_ips=$(grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' $temp_file | sort -u)
        
        # 验证IP格式并过滤
        valid_ips=()
        for ip in $extracted_ips; do
          if [[ $ip =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
            # 验证每个数字是否在0-255范围内
            valid_ip=true
            for octet in $(echo $ip | sed 's/\./ /g'); do
              if [[ $octet -lt 0 ]] || [[ $octet -gt 255 ]]; then
                valid_ip=false
                break
              fi
            done
            
            if [[ $valid_ip == true ]]; then
              valid_ips+=("$ip")
            fi
          fi
        done
        
        # 创建输出文件
        output_file="ips.txt"
        > $output_file
        
        count=0
        for ip in "${valid_ips[@]}"; do
          # 使用IP地理位置API获取国家信息
          country_code=""
          # 避免网络超时，使用更短的超时时间
          response=$(curl -s --max-time 3 "http://ip-api.com/json/$ip?fields=countryCode" 2>/dev/null)
          if [[ $? -eq 0 ]]; then
            country_code=$(echo "$response" | jq -r '.countryCode' 2>/dev/null || echo "")
          fi
          
          # 如果API调用失败或返回无效结果，使用基于IP段的分类
          if [[ -z "$country_code" ]] || [[ "$country_code" == "null" ]] || [[ "$country_code" == "undefined" ]]; then
            # 基于CF常用IP段进行分类
            first_octet=$(echo "$ip" | cut -d. -f1)
            second_octet=$(echo "$ip" | cut -d. -f2)
            
            case $first_octet in
              103)
                country_code="SG"
                ;;
              104)
                country_code="US"
                ;;
              108)
                country_code="US"
                ;;
              131)
                country_code="US"
                ;;
              141)
                country_code="US"
                ;;
              162)
                country_code="US"
                ;;
              172)
                country_code="US"
                ;;
              173)
                country_code="US"
                ;;
              188)
                country_code="US"
                ;;
              190)
                country_code="PA"
                ;;
              197)
                country_code="US"
                ;;
              198)
                country_code="US"
                ;;
              *)
                country_code="US"
                ;;
            esac
          fi
          
          # 确保country_code有效
          if [[ -z "$country_code" ]] || [[ "$country_code" == "null" ]]; then
            country_code="US"
          fi
          
          # 生成格式化的输出
          formatted_line="$ip:443#$country_code-github"
          echo "$formatted_line" >> $output_file
          echo "Added: $formatted_line"
          ((count++))
        done
        
        # 清理临时文件
        rm $temp_file
        
        echo "Processing complete. Generated ips.txt with $count entries."
        
    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # 检查是否有更改
        if [[ -n "$(git status --porcelain)" ]]; then
          git add ips.txt
          git commit -m "Update IPs from cf-speed-dns - $(date)"
          git push
          echo "Changes committed and pushed successfully"
        else
          echo "No changes to commit"
        fi
