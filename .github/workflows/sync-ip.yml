name: Sync IPs from cf-speed-dns

on:
  schedule:
    # 每30分钟执行一次
    - cron: '*/30 * * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  sync-ips:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Fetch and parse IP data
      run: |
        # 获取HTML内容
        html_content=$(curl -s "https://raw.githubusercontent.com/ZhiXuanWang/cf-speed-dns/refs/heads/main/ipTop10.html")
        
        # 提取所有IP地址
        echo "$html_content" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | sort -u > temp_ips.txt
        
        # 创建输出文件
        > ips.txt
        
        count=0
        while IFS= read -r ip; do
          if [[ -n "$ip" ]]; then
            # 验证IP格式
            if [[ $ip =~ ^([0-9]{1,3}\.)+[0-9]{1,3}$ ]]; then
              # 检查每个数字是否在0-255范围内
              valid=true
              IFS='.' read -ra parts <<< "$ip"
              for part in "${parts[@]}"; do
                if [[ $part -lt 0 || $part -gt 255 ]]; then
                  valid=false
                  break
                fi
              done
              
              if [[ $valid == true ]]; then
                echo "$ip:443#CF-github" >> ips.txt
                echo "Added: $ip:443#CF-github"
                ((count++))
              fi
            fi
          fi
        done < temp_ips.txt
        
        rm temp_ips.txt
        echo "Processing complete. Generated ips.txt with $count entries."
        
    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        if [[ -n "$(git status --porcelain)" ]]; then
          git add ips.txt
          git commit -m "Update IPs from cf-speed-dns - $(date)"
          git push
        fi
